{{ define "main" }}
<div class="articles">
  {{ range where .Site.RegularPages "Section" "in" site.Params.mainSections }}
  <div class="article">
      <a href="{{ .Permalink }}">
      {{ .Title }}
      </a>
      <em><small><time>{{ .Date.Format "2006-01-02" }}</time></small></em>
    </div>
  {{- end }}
</div>
{{ end }}
